<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL Uploader Youtube</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #212121;
            padding: 30px;
            border-radius: 12px;
        }
        h1 { color: #ff0000; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin: 10px;
        }
        .btn-logout { background: #555; }
        #user-info { margin: 20px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AL Uploader Youtube</h1>
        
        <div id="user-info">Silakan login dulu bos</div>
        
        <a href="/auth/google" id="login-btn" class="btn">Login dengan Google</a>
        <a href="/logout" id="logout-btn" class="btn btn-logout" style="display:none;">Logout</a>
    </div>

    <script>
        // Cek status login pas buka web
        fetch('/api/user')
            .then(res => res.json())
            .then(data => {
                const userInfo = document.getElementById('user-info');
                const loginBtn = document.getElementById('login-btn');
                const logoutBtn = document.getElementById('logout-btn');
                
                if(data.loggedIn){
                    userInfo.innerHTML = `Login Berhasil Bos!<br>Halo, ${data.name}<br>${data.email}`;
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                } else {
                    userInfo.innerHTML = 'Silakan login dulu bos';
                    loginBtn.style.display = 'inline-block';
                    logoutBtn.style.display = 'none';
                }
            })
            .catch(err => {
                document.getElementById('user-info').innerHTML = 'Error cek login';
            });
    </script>
</body>
</html>
