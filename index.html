<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AL Uploader</title><style>body{font-family:sans-serif;background:#111;color:#fff;padding:15px}.card{background:#222;padding:20px;border-radius:12px;max-width:400px;margin:auto}input,button,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:0;background:#333;color:#fff}button{background:red;font-weight:700}#log{margin-top:10px;font-size:14px;word-break:break-all}</style></head><body><div class="card"><h2>Upload YouTube</h2><input type="file" id="v" accept="video/*"><input id="j" placeholder="Judul"><textarea id="d" placeholder="Deskripsi"></textarea><button onclick="up()">Upload</button><div id="log">Siap</div></div><script>const API='GANTI_URL_RAILWAY/upload';async function up(){const f=v.files[0];if(!f)return log.innerText='Pilih video';log.innerText='Uploading...';const fd=new FormData();fd.append('video',f);fd.append('judul',j.value);fd.append('deskripsi',d.value);try{const r=await fetch(API,{method:'POST',body:fd}),d=await r.json();log.innerHTML=d.sukses?`Sukses: <a href="${d.link}" target="_blank">${d.link}</a>`:'Error: '+d.error}catch(e){log.innerText='Gagal konek'}};</script></body></html>
